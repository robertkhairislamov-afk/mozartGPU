      margin: 0;
      padding: 0;

      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── Canvas ─────────────────────────────────────────────── */
    #og {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #0D0517;
      overflow: hidden;
    }

    /* ── Radial gradient spotlight ──────────────────────────── */
    #og::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 500px at 60% 50%, rgba(91,44,111,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 15% 80%, rgba(212,168,67,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Subtle grid overlay ─────────────────────────────────── */
    #og::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,168,67,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,67,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── Left gold bar accent ───────────────────────────────── */
    .edge-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, transparent 0%, #D4A843 30%, #D4A843 70%, transparent 100%);
    }

    /* ── Main content layout ─────────────────────────────────── */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 84px;
      gap: 0;
      z-index: 1;
    }

    /* ── Logo mark (5 vertical bars) ──────────────────────────── */
    .logo-mark {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      margin-bottom: 32px;
    }

    .logo-mark span {
      display: block;
      width: 9px;
      background: #D4A843;
      border-radius: 3px;
    }

    .logo-mark span:nth-child(1) { height: 52px; }
    .logo-mark span:nth-child(2) { height: 36px; }
    .logo-mark span:nth-child(3) { height: 26px; }
    .logo-mark span:nth-child(4) { height: 36px; }
    .logo-mark span:nth-child(5) { height: 52px; }

    /* ── Brand name ──────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin-bottom: 20px;
      line-height: 1;
    }

    .brand-name {
      font-size: 86px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #FFFFFF;
      text-transform: uppercase;
      line-height: 1;
    }

    .brand-label {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #D4A843;
      line-height: 1;
      padding-bottom: 6px;
    }

    /* ── Tagline ─────────────────────────────────────────────── */
    .tagline {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,255,255,0.70);
      letter-spacing: 0.02em;
      margin-bottom: 40px;
      line-height: 1.3;
    }

      color: rgba(255,255,255,0.95);
      font-weight: 600;
    }

      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);

      align-items: center;
      justify-content: center;
      font-size: 11px;

      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;

      width: 360px;
      height: 360px;
      opacity: 0.85;
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(255,255,255,0.025);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 84px;
      z-index: 2;
      justify-content: space-between;
    }

    .domain {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.30);
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }

    /* ── Crypto icons cluster ─────────────────────────────────── */
    .crypto-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .crypto-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 0.1em;

    .crypto-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);

    .crypto-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;

    .crypto-chip.usdc .crypto-dot { background: #2775CA; }

    .chip-visual {

      right: 52px;
      top: 50%;
