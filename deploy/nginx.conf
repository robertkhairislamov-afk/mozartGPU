# MOZART GPU Rental — Nginx reverse proxy config
# Handles:
#   - TLS termination (certbot certs, with HTTP→HTTPS redirect)
#   - /btcpay-webhook  → provision-webhook:8081  (rate-limited)
#   - /btcpay/         → btcpayserver:49392
#   - /                → static landing page at /var/www/html
#
# First deploy: run in HTTP-only mode (comment out the HTTPS server block),
# issue certs with certbot, then uncomment HTTPS block and reload nginx.

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured access log — easier to parse with any log aggregator
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Hide Nginx version in headers and error pages
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Compression — Brotli is preferred, gzip as fallback
    # ---------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------

    # Strict zone for the BTCPay webhook endpoint — 10 req/s per IP
    # Burst of 20 allows short spikes (BTCPay can retry quickly on 429)
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

    # General zone for the landing page and BTCPay UI
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # ---------------------------------------------------------------------------
    upstream provision_webhook {
        server provision-webhook:8081;
        keepalive 4;
    }

    upstream btcpay {
        server btcpayserver:49392;
        keepalive 4;
    }

    # ---------------------------------------------------------------------------
    # Server: HTTP — redirect everything to HTTPS (except ACME challenges)
    # ---------------------------------------------------------------------------
    server {
        listen       80;
        listen  [::]:80;
        server_name  mozartgpu.com www.mozartgpu.com btcpay.mozartgpu.com;

        # Let's Encrypt ACME HTTP-01 challenge
        location /.well-known/acme-challenge/ {
            root /var/www/html;
            allow all;
        }

        # Internal health check used by Docker (no redirect)
        location = /health-nginx {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # Server: HTTPS — mozartgpu.com (landing page)
    # ---------------------------------------------------------------------------
    # NOTE: Comment this entire block out on first deploy until certbot has issued
    #       certs. Re-enable after: certbot certonly --webroot -w /var/www/html ...
    # ---------------------------------------------------------------------------
    server {
        listen       443 ssl http2;
        listen  [::]:443 ssl http2;
        server_name  mozartgpu.com www.mozartgpu.com;

        # --- SSL (managed by certbot) ---
        ssl_certificate     /etc/letsencrypt/live/mozartgpu.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mozartgpu.com/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # --- Security headers ---
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://btcpay.mozartgpu.com; frame-src https://btcpay.mozartgpu.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # --- Rate limiting ---
        limit_req zone=general_limit burst=30 nodelay;

        # --- Static landing page ---
        root  /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;

            # Aggressive caching for fingerprinted assets (css/js with hash in name)
            location ~* \.(css|js|woff2|woff|ttf|otf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Long cache for images
            location ~* \.(png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
                expires 30d;
                add_header Cache-Control "public";
                access_log off;
            }
        }

        # --- BTCPay webhook: proxied to provision-webhook service ---
        location = /btcpay-webhook {
            limit_req zone=webhook_limit burst=20 nodelay;

            # Only allow POST — block everything else at the proxy layer
            limit_except POST {
                deny all;
            }

            proxy_pass         http://provision_webhook/btcpay-webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Preserve the raw body so HMAC signature validation works
            proxy_pass_request_headers on;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # --- Internal health check ---
        location = /health-nginx {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ---------------------------------------------------------------------------
    # Server: HTTPS — btcpay.mozartgpu.com (BTCPay Server UI + API)
    # ---------------------------------------------------------------------------
    # NOTE: Comment this block out on first deploy until certbot has issued certs.
    # ---------------------------------------------------------------------------
    server {
        listen       443 ssl http2;
        listen  [::]:443 ssl http2;
        server_name  btcpay.mozartgpu.com;

        ssl_certificate     /etc/letsencrypt/live/btcpay.mozartgpu.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/btcpay.mozartgpu.com/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;

        # --- Rate limiting ---
        limit_req zone=general_limit burst=60 nodelay;

        # --- Proxy to BTCPay Server ---
        location / {
            proxy_pass         http://btcpay/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # BTCPay uses WebSockets for live payment updates
            proxy_read_timeout    600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    600s;

            # Increase buffer for large BTCPay responses (invoice pages embed QR codes)
            proxy_buffer_size        128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size  256k;
        }

        location = /health-nginx {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
